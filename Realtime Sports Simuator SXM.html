function ensureDatasetTeams(dataset){
  const baseTeams = Array.isArray(dataset?.teams) ? dataset.teams.map(team=>{
    const merged = dataset?.isWC ? {...team, ...(WC_TEAM_OVERRIDES[team.abbr] || {})} : {...team};
    return {
      ...merged,
      fullName: merged.fullName || merged.name || merged.abbr,
      name: merged.name || merged.fullName || merged.abbr,
      color: normalizeHexColor(merged.color, "#111111"),
    };
  }) : [];
  if(baseTeams.length >= 2) return baseTeams;
  const fallbackColor = normalizeHexColor(dataset?.leagueColor, "#111111");
  const altColor = fg(fallbackColor) === "#ffffff" ? "#E2E8F0" : "#0F172A";
  return [
    baseTeams[0] || { abbr:"AWY", name:"Away", fullName:"Away", color:fallbackColor, logo:"" },
    baseTeams[1] || { abbr:"HME", name:"Home", fullName:"Home", color:altColor, logo:"" },
  ];
}

// ─── Utils ───────────────────────────────────────────────────────────────────
function luma(hex="#111") {
  const c = hex.replace("#","").padEnd(6,"0").slice(0,6);
  const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  return (r*299+g*587+b*114)/1000;
}
function fg(hex){ return luma(hex)>145?"#0d0d0d":"#ffffff"; }
function flagImageUrl(code){
  if(!code) return "";
  const special = {
    "gb-eng":"https://upload.wikimedia.org/wikipedia/en/b/be/Flag_of_England.svg",
    "gb-sct":"https://upload.wikimedia.org/wikipedia/commons/1/10/Flag_of_Scotland.svg",
  };
  return special[code] || `https://flagcdn.com/${code}.svg`;
}
function flagEmoji(code){
  const sp={"gb-eng":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","gb-sct":"🏴󠁧󠁢󠁳󠁣󠁴󠁿"};
  if(sp[code]) return sp[code];
  if(!code||code.length!==2) return "🏳️";
  return code.toUpperCase().split("").map(c=>String.fromCodePoint(127397+c.charCodeAt(0))).join("");
}
function clampScore(value){
  return Number.isFinite(value) ? Math.max(0, Math.min(20, value)) : 0;
}
function normalizeHexColor(value, fallback="#111111"){
  const raw = String(value || "").trim().replace(/^#/,"");
  if(/^[0-9a-fA-F]{6}$/.test(raw)) return `#${raw.toUpperCase()}`;
  return fallback;
}
function ensureDifferentIndex(nextIdx, otherIdx, total){
  if(total <= 1) return 0;
  if(nextIdx !== otherIdx) return nextIdx;
  return (nextIdx + 1) % total;
}
function getDefaultAwayIndex(teams){
  const total = Array.isArray(teams) ? teams.length : 0;
  if(total <= 1) return 0;
  return Math.min(4, total - 1);
}
function getDisplayMatchup(home, away, homeScore, awayScore, isSoccer){
  if(isSoccer){
    return { home, away, homeScore, awayScore, homeIdxFirst:true };
  }
  return {
    home: away,
    away: home,
    homeScore: awayScore,
    awayScore: homeScore,
    homeIdxFirst:false,
  };
}
function normalizeClock(state, rawClock){
  if(state === "Upcoming") return "";
  if(state === "Halftime") return "HT";
  if(state === "Full Time" || state === "Final") return "FT";
  return rawClock;
}
function formatFeedTimestamp(value){
  if(!value) return "Waiting for update";
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return value;
  return date.toLocaleString("en-US", {
    month:"short",
    day:"numeric",
    hour:"numeric",
    minute:"2-digit",
    second:"2-digit",
    timeZoneName:"short",
  });
}
function deriveRealtimeState(payload){
  const scores = Array.isArray(payload?.scores) ? [...payload.scores] : [];
  if(!scores.length) return null;
  scores.sort((a,b)=>new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
  const latest = scores[0];
  const period = String(latest?.period || "").toUpperCase();
  let matchState = "Upcoming";
  let clock = "";
  if(period === "FT"){
    matchState = "Final";
    clock = "FT";
  }else if(period === "HT"){
    matchState = "Halftime";
    clock = "HT";
  }else if(period === "ET"){
    matchState = "Extra Time";
    clock = "ET";
  }else if(period){
    matchState = "Live";
    clock = period;
  }
  const timeline = scores.map((item, index)=>({
    id:`${item.timestamp || "na"}-${item.period || "none"}-${index}`,
    period:item.period || "PRE",
    homeScore:clampScore(item.homeScore),
    awayScore:clampScore(item.awayScore),
    timestamp:item.timestamp || "",
  }));
  return {
    homeScore:clampScore(latest.homeScore),
    awayScore:clampScore(latest.awayScore),
    matchState,
    clock,
    period:period || "PRE",
    timestamp:latest.timestamp || "",
    timeline,
  };
}
function deriveMatchStateFromPeriod(rawPeriod){
  const period = String(rawPeriod || "").toUpperCase();
  if(period === "FT") return { matchState:"Final", clock:"FT", period:"FT" };
  if(period === "HT") return { matchState:"Halftime", clock:"HT", period:"HT" };
  if(period === "ET") return { matchState:"Extra Time", clock:"ET", period:"ET" };
  if(period) return { matchState:"Live", clock:period, period };
  return { matchState:"Upcoming", clock:"", period:"PRE" };
}
function buildReplayFrames(timeline, incrementMinutes){
  if(!Array.isArray(timeline) || !timeline.length) return [];
  const chronological = [...timeline]
    .filter(item=>item?.timestamp)
    .sort((a,b)=>new Date(a.timestamp || 0) - new Date(b.timestamp || 0));
  if(!chronological.length) return [];
  const stepMs = Math.max(1, Number(incrementMinutes) || 1) * 60 * 1000;
  const startMs = new Date(chronological[0].timestamp).getTime();
  const buckets = [];
  chronological.forEach(item=>{
    const itemMs = new Date(item.timestamp).getTime();
    const bucketIndex = Math.max(0, Math.floor((itemMs - startMs) / stepMs));
    const current = buckets[bucketIndex];
    if(!current || itemMs >= new Date(current.timestamp).getTime()){
      buckets[bucketIndex] = item;
    }
  });
  const collapsed = buckets.filter(Boolean);
  return collapsed.map((item, index)=>({
    ...item,
    frameIndex:index,
    label:`+${index * Math.max(1, Number(incrementMinutes) || 1)}m`,
    ...deriveMatchStateFromPeriod(item.period),
  }));
}
function sxmImageUrl(path){
  return path ? `${SXM_IMG}${path.replace(/^\/+/,"")}` : "";
}
function assetUrl(path){
  if(!path) return "";
  if(/^https?:\/\//i.test(path) || /^data:/i.test(path)) return path;
  if(/^(aem|if)\//.test(path)) return sxmImageUrl(path);
  return path;
}

function AnimatedScore({ value, visible=true, style={}, accent="rgba(77,163,255,0.75)", hiddenValue="" }){
  const [isAnimating,setIsAnimating] = useState(false);
  const prevValueRef = useRef(value);

  useEffect(()=>{
    if(!visible){
      prevValueRef.current = value;
      setIsAnimating(false);
      return;
    }
    if(prevValueRef.current === value) return;
    prevValueRef.current = value;
    setIsAnimating(true);
    const timer = window.setTimeout(()=>setIsAnimating(false), 680);
    return ()=>window.clearTimeout(timer);
  }, [value, visible]);

  return (
    <span style={{
      ...style,
      display:"inline-block",
      transformOrigin:"50% 60%",
      animation:isAnimating ? "scorePulse 680ms cubic-bezier(0.2,0.8,0.2,1)" : "none",
      textShadow:isAnimating ? `0 0 18px ${accent}, 0 0 34px ${accent}` : style.textShadow,
      willChange:"transform, filter, opacity",
    }}>
      {visible ? value : hiddenValue}
    </span>
  );
}

function createCrowdCheer(audioContext){
  const duration = 1.9;
  const master = audioContext.createGain();
  master.gain.setValueAtTime(0.0001, audioContext.currentTime);
  master.gain.exponentialRampToValueAtTime(0.2, audioContext.currentTime + 0.18);
  master.gain.exponentialRampToValueAtTime(0.05, audioContext.currentTime + duration);
  master.connect(audioContext.destination);

  const frameCount = Math.max(1, Math.floor(audioContext.sampleRate * duration));
  const noiseBuffer = audioContext.createBuffer(1, frameCount, audioContext.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for(let i=0;i<frameCount;i+=1){
    data[i] = (Math.random() * 2 - 1) * 0.85;
  }

  const noiseSource = audioContext.createBufferSource();
  noiseSource.buffer = noiseBuffer;
  const noiseFilter = audioContext.createBiquadFilter();
  noiseFilter.type = "bandpass";
  noiseFilter.frequency.setValueAtTime(620, audioContext.currentTime);
  noiseFilter.Q.setValueAtTime(0.8, audioContext.currentTime);
  noiseSource.connect(noiseFilter);
  noiseFilter.connect(master);
  noiseSource.start();
  noiseSource.stop(audioContext.currentTime + duration);

  const swell = audioContext.createOscillator();
  const swellGain = audioContext.createGain();
  swell.type = "triangle";
  swell.frequency.setValueAtTime(180, audioContext.currentTime);
  swell.frequency.exponentialRampToValueAtTime(260, audioContext.currentTime + 0.45);
  swell.frequency.exponentialRampToValueAtTime(140, audioContext.currentTime + duration);
  swellGain.gain.setValueAtTime(0.0001, audioContext.currentTime);
  swellGain.gain.exponentialRampToValueAtTime(0.045, audioContext.currentTime + 0.2);
  swellGain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
  swell.connect(swellGain);
  swellGain.connect(master);
  swell.start();
  swell.stop(audioContext.currentTime + duration);
}

// ══════════════════════════════════════════════════════════════════════════════
// ─── FIGMA-ALIGNED LIVE SCORE CARD ───────────────────────────────────────────
// Matches: bg #1b2227, rounding 8px, LIVE badge + league + clock/period,
//          team rows: logo(24px) + abbr(14px medium) + score(14px medium)
// ══════════════════════════════════════════════════════════════════════════════
function LiveScoreCard({ teamA, teamB, scoreA, scoreB, stateStr, clockStr, league, isWC, isMain, leagueColor }) {
  const isLive    = stateStr === "LIVE";
  const isUpcoming = stateStr === "TODAY" || stateStr === "UPCOMING";
  const isFinal   = stateStr === "FINAL";
  const isHT      = stateStr === "HT";
  const isET      = stateStr === "ET";
  const showScore = !isUpcoming;

  // Period / status label shown top-right
  let periodLabel;
  if (isLive)     periodLabel = clockStr || "LIVE";
  else if (isHT)  periodLabel = "HT";
  else if (isET)  periodLabel = "ET";
  else if (isFinal) periodLabel = "FINAL";
  else if (isUpcoming) periodLabel = clockStr || "7:00PM";
  else             periodLabel = "";

  return (
    <div style={{
      background: "#1d2329",
      borderRadius: 8,
      padding: "10px 10px 8px",
      display: "flex",
      flexDirection: "column",
      gap: 9,
      border: isMain ? "1px solid rgba(255,255,255,0.06)" : "1px solid transparent",
      position: "relative",
      overflow: "hidden",
    }}>
      {/* Header row: league left | status/clock right */}
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", height:14}}>
        <div style={{display:"flex", alignItems:"center", gap:4}}>
          {/* Live badge */}
          {isLive && (
            <div style={{display:"flex", alignItems:"center", gap:3,
              fontSize:9, fontWeight:700, color:"#f3f5f7",
              letterSpacing:"0.02em", textTransform:"uppercase",
              fontFamily:"'Helvetica Now Text', 'Helvetica Neue', Helvetica, sans-serif",
              lineHeight:1,
            }}>
              <span>LIVE </span>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#4DA3FF",
                display:"inline-block",flexShrink:0}}/>
            </div>
          )}
          {/* League */}
          <span style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.32)",textTransform:"uppercase",
            fontFamily:"'Helvetica Now Text','Helvetica Neue',Helvetica,sans-serif",lineHeight:1}}>
            {league}
          </span>
        </div>
        {/* Period / clock right-aligned */}
        {periodLabel && (
          <span style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.56)",textTransform:"uppercase",
            fontFamily:"'Helvetica Now Text','Helvetica Neue',Helvetica,sans-serif",lineHeight:1}}>
            {periodLabel}
          </span>
        )}
      </div>

      {/* Team A row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:24,height:24,flexShrink:0,display:"grid",placeItems:"center"}}>
            <InlineLogo team={teamA} isWC={isWC} size={24}/>
          </div>
          <span style={{
            fontSize:15, fontWeight:700, color:"#cfd6dd",
            fontFamily:"'Helvetica Now Text','Helvetica Neue',Helvetica,sans-serif",
            lineHeight:1.25, whiteSpace:"nowrap",
          }}>{teamA.abbr}</span>
        </div>
        <span style={{
          fontSize:15, fontWeight:700, color:"#fff",
          fontFamily:"'Helvetica Now Text','Helvetica Neue',Helvetica,sans-serif",
          lineHeight:1.25,
        }}><AnimatedScore value={scoreA} visible={showScore} accent="rgba(77,163,255,0.85)"
          style={{fontSize:15, fontWeight:700, color:"#fff",
            fontFamily:"'Helvetica Now Text','Helvetica Neue',Helvetica,sans-serif",
            lineHeight:1.25}}/></span>
      </div>

      {/* Team B row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:24,height:24,flexShrink:0,display:"grid",placeItems:"center"}}>
            <InlineLogo team={teamB} isWC={isWC} size={24}/>
          </div>
          <span style={{
            fontSize:15, fontWeight:700, color:"#cfd6dd",
            fontFamily:"'Helvetica Now Text','Helvetica Neue',Helvetica,sans-serif",
            lineHeight:1.25, whiteSpace:"nowrap",
          }}>{teamB.abbr}</span>
        </div>
        <span style={{
          fontSize:15, fontWeight:700, color:"#fff",
          fontFamily:"'Helvetica Now Text','Helvetica Neue',Helvetica,sans-serif",
          lineHeight:1.25,
        }}><AnimatedScore value={scoreB} visible={showScore} accent="rgba(77,163,255,0.85)"
          style={{fontSize:15, fontWeight:700, color:"#fff",

function MobileListView({teams, homeIdx, awayIdx, homeScore, awayScore, matchState, clock, league, isWC, dateLabel, leagueColor}){
  const home = teams[homeIdx]||teams[0];
  const away = teams[awayIdx]||teams[1];

  // Build filler matchups
  const others = teams.filter((_,i)=>i!==homeIdx&&i!==awayIdx);
  const fillerPairs = [];
  for(let i=0;i<others.length-1&&fillerPairs.length<9;i+=2){
    fillerPairs.push([others[i],others[i+1]]);
  }

  const scheduledTime = (dateLabel || "").split("·").pop().trim();
  const stateStr = matchState==="Full Time"||matchState==="Final" ? "FINAL"
    : matchState==="Live" ? "LIVE"
    : matchState==="Halftime" ? "HT"
    : matchState==="Extra Time" ? "ET"
    : "TODAY";

  const clockStr = matchState==="Live" ? (clock || "") : stateStr==="TODAY" ? scheduledTime : "";

  const fillerData = [
    {stateStr:"FINAL", scoreA:2, scoreB:1, clockStr:"6:35PM"},
    {stateStr:"FINAL", scoreA:3, scoreB:0, clockStr:"6:40PM"},
    {stateStr:"LIVE",  scoreA:1, scoreB:1, clockStr:"67'"},

    {stateStr:"LIVE",  scoreA:0, scoreB:2, clockStr:"54'"},
    {stateStr:"TODAY", scoreA:0, scoreB:0, clockStr:"7:00PM"},
    {stateStr:"FINAL", scoreA:1, scoreB:3, clockStr:"7:05PM"},
    {stateStr:"TODAY", scoreA:0, scoreB:0, clockStr:"7:30PM"},
  ];

  // Filter pill labels — adapt to league context
  const filterLabels = isWC
    ? ["All", "FIFA World Cup 2026", "Group", "Knockout", "Live"]
    : ["All", "EPL", "Featured", "Live", "Final"];
  const selectedFilter = isWC ? "FIFA World Cup 2026" : "EPL";

  return (
    <div style={{display:"flex",flexDirection:"column",background:"#171b1f",height:596,overflow:"hidden"}}>
      {/* ── App Bar ── */}
      <div style={{background:"#171b1f",flexShrink:0}}>
        {/* Primary bar: back chevron */}

          height:52,
          display:"flex",
          alignItems:"center",
          paddingLeft:18,
          paddingRight:24,
        }}>
          <div style={{
            width:20, height:20,
            display:"flex", alignItems:"center", justifyContent:"center",
            flexShrink:0, cursor:"pointer",
          }}>
            {/* Chevron left */}
            <svg width="11" height="18" viewBox="0 0 11 18" fill="none">
              <path d="M9.5 1L1.5 9L9.5 17" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        </div>

        {/* Secondary bar: title */}
        <div style={{
          paddingLeft:20, paddingRight:20,
          paddingBottom:12,
        }}>
          <span style={{
            fontSize:21, fontWeight:700, color:"#ffffff",
            fontFamily:"'Helvetica Now Text','Helvetica Neue',Helvetica,sans-serif",
            lineHeight:1.2, letterSpacing:"-0.02em",
          }}>Today's games</span>
        </div>

        {/* Tertiary bar: filter pills */}
        <div style={{
          height:40,
          display:"flex",
          alignItems:"center",
          overflowX:"auto",
          paddingLeft:20,
          paddingBottom:0,
          gap:10,
        }}>
          {filterLabels.map((label, i) => {
            const isSelected = label === selectedFilter;
            return (
              <div
                key={label}
                style={{
                  minWidth:48,
                  height:28,
                  borderRadius:999,
                  paddingLeft:14,
                  paddingRight:14,
                  display:"flex",
                  alignItems:"center",
                  justifyContent:"center",
                  flexShrink:0,
                  cursor:"pointer",
                  background: isSelected ? "#f3f5f7" : "#101315",
                  border: "none",
                }}

                <span style={{
                  fontSize:11, fontWeight:700,

                  {label}

          <div style={{width:8, flexShrink:0}}/>

        <div style={{height:8}}/>
      </div>

      {/* ── Game Cards Grid ── */}
      <div style={{
        flex:1,
        overflowY:"auto",
        padding:"18px 20px 0",
        background:"#171b1f",
      }}>
        <div style={{
          display:"grid",

          paddingBottom:120,
        }}>
          {/* Featured / main matchup first */}
          <LiveScoreCard

            league={league} isWC={isWC} isMain={true} leagueColor={leagueColor}

                  minHeight:32,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>
                  {card.title}
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{borderRadius:20,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.05)",
          padding:"14px 15px"}}>
          <div style={{fontSize:15,fontWeight:900,color:"#fff",marginBottom:5}}>Ways to listen</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.58)",lineHeight:1.35}}>
            Jump back into live match coverage, league hubs, and team-specific audio from the sports home feed.
          </div>
        </div>

      <div style={{flexShrink:0,background:"#0a0f14",padding:"8px 20px 14px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:6}}>
          {["Discover","Channels","Search","Library"].map((item,i)=>(
            <div key={item} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,color:i===0?"#fff":"rgba(255,255,255,0.5)"}}>
              <div style={{fontSize:20,lineHeight:1}}>{["♞","◉","⌕","▯"][i]}</div>
              <div style={{fontSize:12,fontWeight:500}}>{item}</div>
            </div>
          ))}
        </div>
        <div style={{width:134,height:5,borderRadius:999,background:"#fff",margin:"16px auto 0",opacity:0.95}}/>
      </div>
    </div>
  );
}

      {isWC

// ══════════════════════════════════════════════════════════════════════════════
// ─── APP ──────────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const datasetKeys = Object.keys(DATASETS);
  const initialDatasetKey = datasetKeys.includes("epl") ? "epl" : datasetKeys[0];
  const initialDataset = DATASETS[initialDatasetKey];
  const defaultRealtimeUrl = "https://sports-cache-dev.streaming.siriusxm.com/playbackservices/v1/sports/event/dbf2edbb-9506-31c2-9ee1-01dfa173e948/scores";
  const [tab,setTab]               = useState(initialDatasetKey);
  const [homeIdx,setHomeIdx]       = useState(0);
  const [awayIdx,setAwayIdx]       = useState(getDefaultAwayIndex(initialDataset.teams));
  const [homeScore,setHomeScore]   = useState(2);
  const [awayScore,setAwayScore]   = useState(1);
  const [matchState,setMatchState] = useState("Live");
  const [clock,setClock]           = useState("74'");
  const [league,setLeague]         = useState(initialDataset.label);
  const [bgMode,setBgMode]         = useState("blend");
  const [customBg,setCustomBg]     = useState("#0f172a");
  const [search,setSearch]         = useState("");
  const [splitA,setSplitA]         = useState(0);
  const [splitB,setSplitB]         = useState(4);
  const [dateLabel,setDateLabel]   = useState("Saturday · 12:30 PM ET");
  const [venue,setVenue]           = useState("Emirates Stadium");
  const [coverageLabel,setCoverageLabel] = useState("SiriusXM FC");
  const [leagueAbbreviation,setLeagueAbbreviation] = useState(initialDataset.label);
  const [leagueBackgroundColor,setLeagueBackgroundColor] = useState(initialDataset.leagueColor);
  const [realtimeEnabled,setRealtimeEnabled] = useState(true);
  const [realtimeUrl,setRealtimeUrl] = useState(defaultRealtimeUrl);
  const [pollMs,setPollMs] = useState(15000);
  const [realtimeData,setRealtimeData] = useState(null);
  const [realtimeStatus,setRealtimeStatus] = useState("Realtime feed idle");
  const [realtimeError,setRealtimeError] = useState("");
  const [isRealtimeLoading,setIsRealtimeLoading] = useState(false);
  const [scoreSoundEnabled,setScoreSoundEnabled] = useState(true);
  const [audioReady,setAudioReady] = useState(false);
  const [replayIncrementMinutes,setReplayIncrementMinutes] = useState(1);
  const [replayMode,setReplayMode] = useState(false);
  const [isReplayPlaying,setIsReplayPlaying] = useState(false);
  const [replayFrameIndex,setReplayFrameIndex] = useState(0);
  const activeRequestRef = useRef(0);
  const audioContextRef = useRef(null);
  const prevActiveScoresRef = useRef(null);

  const ds=DATASETS[tab] || initialDataset, teams=ds.teams, isWC=ds.isWC, isSoccer=ds.isSoccer;
  const normalizedLeagueColor = normalizeHexColor(leagueBackgroundColor, normalizeHexColor(ds.leagueColor));
  const home=teams[homeIdx]||teams[0], away=teams[awayIdx]||teams[1];
  const safeHomeScore = clampScore(homeScore);
  const safeAwayScore = clampScore(awayScore);
  const normalizedClock = normalizeClock(matchState, clock);
  const clockLocked = matchState === "Upcoming" || matchState === "Halftime" || matchState === "Full Time" || matchState === "Final";
  const replayFrames = useMemo(
    ()=>buildReplayFrames(realtimeData?.timeline || [], replayIncrementMinutes),
    [realtimeData?.timeline, replayIncrementMinutes]
  );
  const replayFrame = replayFrames[replayFrameIndex] || replayFrames[0] || null;
  const liveScores = realtimeEnabled && realtimeData ? {
    homeScore:realtimeData.homeScore,
    awayScore:realtimeData.awayScore,
    matchState:realtimeData.matchState,
    clock:normalizeClock(realtimeData.matchState, realtimeData.clock),
  } : {
    homeScore:safeHomeScore,
    awayScore:safeAwayScore,
    matchState,
    clock:normalizedClock,
  };
  const activeScores = replayMode && replayFrame ? {
    homeScore:replayFrame.homeScore,
    awayScore:replayFrame.awayScore,
    matchState:replayFrame.matchState,
    clock:normalizeClock(replayFrame.matchState, replayFrame.clock),
  } : liveScores;
  const displayMatchup = getDisplayMatchup(home, away, activeScores.homeScore, activeScores.awayScore, isSoccer);
  const displaySelection = isSoccer
    ? { homeIdx, awayIdx }
    : { homeIdx: awayIdx, awayIdx: homeIdx };

  async function fetchRealtimeScores(){
    const url = realtimeUrl.trim();
    if(!url){
      setRealtimeError("Enter a scores endpoint URL to enable realtime updates.");
      setRealtimeStatus("Realtime feed missing URL");
      setRealtimeData(null);
      return;
    }
    const requestId = activeRequestRef.current + 1;
    activeRequestRef.current = requestId;
    setIsRealtimeLoading(true);
    setRealtimeError("");
    setRealtimeStatus("Fetching realtime scores...");
    try{
      const response = await fetch(url, { cache:"no-store" });
      if(!response.ok){
        throw new Error(`HTTP ${response.status}`);
      }
      const payload = await response.json();
      const next = deriveRealtimeState(payload);
      if(activeRequestRef.current !== requestId) return;
      if(!next){
        setRealtimeData(null);
        setRealtimeStatus("No score updates returned");
        setRealtimeError("The endpoint responded, but no `scores` timeline was available.");
        return;
      }
      setRealtimeData(next);
      setRealtimeStatus(`Mapped ${next.timeline.length} update${next.timeline.length===1?"":"s"} from ${next.period}`);
      setRealtimeError("");
    }catch(error){
      if(activeRequestRef.current !== requestId) return;
      setRealtimeError(error?.message || "Unable to load realtime scores.");
      setRealtimeStatus("Realtime feed unavailable");
    }finally{
      if(activeRequestRef.current === requestId) setIsRealtimeLoading(false);
    }
  }

  useEffect(()=>{
    if(!realtimeEnabled) return;
    fetchRealtimeScores();
  }, [realtimeEnabled, realtimeUrl]);

  useEffect(()=>{
    if(!realtimeEnabled) return;
    const intervalMs = Math.max(3000, Number(pollMs) || 15000);
    const timer = window.setInterval(fetchRealtimeScores, intervalMs);
    return ()=>window.clearInterval(timer);
  }, [realtimeEnabled, pollMs, realtimeUrl]);

  useEffect(()=>{
    if(replayFrameIndex >= replayFrames.length){
      setReplayFrameIndex(Math.max(0, replayFrames.length - 1));
    }
  }, [replayFrameIndex, replayFrames.length]);

  useEffect(()=>{
    if(!replayMode || !isReplayPlaying || replayFrames.length <= 1) return;
    const timer = window.setInterval(()=>{
      setReplayFrameIndex(current=>{
        if(current >= replayFrames.length - 1){
          setIsReplayPlaying(false);
          return current;
        }
        return current + 1;
      });
    }, 1000);
    return ()=>window.clearInterval(timer);
  }, [replayMode, isReplayPlaying, replayFrames.length]);

  useEffect(()=>{
    if(!scoreSoundEnabled) return;
    function armAudio(){
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return;
      if(!audioContextRef.current){
        audioContextRef.current = new AudioCtx();
      }
      const ctx = audioContextRef.current;
      if(ctx.state === "suspended"){
        ctx.resume().catch(()=>{});
      }
      setAudioReady(ctx.state === "running" || ctx.state === "suspended");
    }
    window.addEventListener("pointerdown", armAudio, { passive:true });
    window.addEventListener("keydown", armAudio);
    return ()=>{
      window.removeEventListener("pointerdown", armAudio);
      window.removeEventListener("keydown", armAudio);
    };
  }, [scoreSoundEnabled]);

  useEffect(()=>{
    const nextSnapshot = {
      homeScore:activeScores.homeScore,
      awayScore:activeScores.awayScore,
      matchState:activeScores.matchState,
    };
    const prevSnapshot = prevActiveScoresRef.current;
    prevActiveScoresRef.current = nextSnapshot;
    if(!prevSnapshot) return;
    const homeIncreased = nextSnapshot.homeScore > prevSnapshot.homeScore;
    const awayIncreased = nextSnapshot.awayScore > prevSnapshot.awayScore;
    const eligibleState = nextSnapshot.matchState === "Live" || nextSnapshot.matchState === "Halftime" || nextSnapshot.matchState === "Extra Time" || nextSnapshot.matchState === "Final";
    if(!scoreSoundEnabled || !eligibleState || (!homeIncreased && !awayIncreased)) return;
    const ctx = audioContextRef.current;
    if(!ctx) return;
    if(ctx.state === "suspended"){
      ctx.resume().then(()=>createCrowdCheer(ctx)).catch(()=>{});
      return;
    }
    if(ctx.state === "running"){
      createCrowdCheer(ctx);
    }
  }, [activeScores.homeScore, activeScores.awayScore, activeScores.matchState, scoreSoundEnabled]);

  function startReplay(){
    if(!replayFrames.length) return;
    setReplayMode(true);
    setReplayFrameIndex(0);
    setIsReplayPlaying(replayFrames.length > 1);
  }
  function toggleReplayPlayback(){
    if(!replayFrames.length) return;
    if(!replayMode){
      startReplay();
      return;
    }
    if(replayFrameIndex >= replayFrames.length - 1){
      setReplayFrameIndex(0);
      setIsReplayPlaying(replayFrames.length > 1);
      return;
    }
    setIsReplayPlaying(value=>!value);
  }
  function stopReplay(){
    setIsReplayPlaying(false);
    setReplayMode(false);
  }

  let stageBg;
  if(bgMode==="blend")      stageBg=`linear-gradient(135deg,${displayMatchup.home.color}cc 0%,${displayMatchup.away.color}cc 100%)`;
  else if(bgMode==="home")  stageBg=displayMatchup.home.color;
  else if(bgMode==="away")  stageBg=displayMatchup.away.color;
  else                      stageBg=customBg;

  function switchTab(t){
    const nextDataset = DATASETS[t];
    const defaultAway = getDefaultAwayIndex(nextDataset.teams);
    setTab(t);setHomeIdx(0);setAwayIdx(defaultAway);
    setSplitA(0);setSplitB(defaultAway);
    setLeague(nextDataset.label);
    setDateLabel(nextDataset.isSoccer ? "Saturday · 12:30 PM ET" : "Sunday · 1:00 PM ET");
    setVenue(nextDataset.isSoccer ? "Emirates Stadium" : `${nextDataset.label} Arena`);
    setCoverageLabel(nextDataset.isSoccer ? "SiriusXM FC" : `${nextDataset.label} Radio`);
    setLeagueAbbreviation(nextDataset.label);
    setLeagueBackgroundColor(nextDataset.leagueColor);
    setSearch("");
  }
  function swapTeams(){
    const[h,a,hs,as_]=[homeIdx,awayIdx,safeHomeScore,safeAwayScore];
    setHomeIdx(a);setAwayIdx(h);setHomeScore(as_);setAwayScore(hs);
  }

  const filtered=useMemo(()=>
    teams.filter(t=>!search||
      t.name.toLowerCase().includes(search.toLowerCase())||
      t.abbr.toLowerCase().includes(search.toLowerCase())
    ),[teams,search]);

  const teamA_split=teams[splitA]||teams[0], teamB_split=teams[splitB]||teams[1];

  const PRESETS = [
    {label:"Live Matchup", hi:0, ai:Math.min(1, teams.length-1), hs:2, as_:1, s:"Live", c:isSoccer?"68'":"Q3"},
    {label:"Final Matchup", hi:Math.min(2, teams.length-1), ai:Math.min(3, teams.length-1), hs:3, as_:2, s:"Final", c:"FT"},
    {label:"Upcoming Matchup", hi:Math.min(4, teams.length-1), ai:Math.min(5, teams.length-1), hs:0, as_:0, s:"Upcoming", c:""},
  ].map(p=>({
    ...p,
    ai:ensureDifferentIndex(p.ai, p.hi, teams.length),
  }));

  return (
    <div style={{minHeight:"100vh",background:"#07090f",
      fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif",color:"#e2e8f0",padding:"24px 20px"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap');
        *{box-sizing:border-box;}
        select option{background:#1e293b;color:#e2e8f0;}
        input:focus,select:focus{border-color:rgba(99,102,241,0.6)!important;box-shadow:0 0 0 2px rgba(99,102,241,0.15);}
        input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        @keyframes liveIconPulse{0%,100%{opacity:.65;transform:scale(.94)}50%{opacity:1;transform:scale(1)}}
        @keyframes scorePulse{
          0%{transform:translateY(14px) scale(0.72);opacity:0;filter:blur(6px)}
          38%{transform:translateY(-5px) scale(1.16);opacity:1;filter:blur(0)}
          62%{transform:translateY(1px) scale(0.96);opacity:1}
          100%{transform:translateY(0) scale(1);opacity:1;filter:blur(0)}
        }
        .chip:hover{transform:translateY(-3px);}
        .chip{transition:transform 0.12s,box-shadow 0.12s;}
        .tab-btn{transition:background 0.15s;}
        .tab-btn:hover{background:rgba(255,255,255,0.07)!important;}
        .preset-btn:hover{opacity:0.8;}
        ::-webkit-scrollbar{width:0;height:0;}
      `}</style>

      {/* Header */}
      <div style={{maxWidth:1280,margin:"0 auto 20px"}}>
        <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:3}}>
          <h1 style={{margin:0,fontSize:20,fontWeight:900,letterSpacing:"-0.02em",color:"#f8fafc"}}>
            Realtime Sports Simuator SXM
          </h1>
          <span style={{fontSize:12,color:"#334155"}}>/ score + mobile layouts + color tools</span>
        </div>
        <p style={{margin:0,fontSize:12,color:"#475569"}}>
          Workbook-driven league and team metadata from Sports Metadata 1.6.0, with league tabs, replay, and sport-specific ordering rules
        </p>
      </div>

      {/* Tabs */}
      <div style={{maxWidth:1280,margin:"0 auto 18px",display:"flex",gap:8,alignItems:"center"}}>
        {Object.entries(DATASETS).map(([key,dataset])=>(
          <button key={key} className="tab-btn" onClick={()=>switchTab(key)} style={{
            padding:"9px 18px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",
            fontSize:13,fontWeight:700,border:"1px solid rgba(255,255,255,0.09)",
            background:tab===key?"linear-gradient(180deg,#2563eb,#1d4ed8)":"rgba(255,255,255,0.04)",
            color:tab===key?"#fff":"#94a3b8",borderColor:tab===key?"transparent":undefined,
            display:"inline-flex",alignItems:"center",gap:10,
          }}>
            {dataset.isWC
              ? <img
                  src="FIFA26.png"
                  alt="FIFA World Cup Trophy"
                  style={{width:16,height:20,objectFit:"contain",display:"block",flexShrink:0}}
                />
              : <LeagueLogo dataset={dataset} size={20}/>
            }
            <span>{dataset.tabLabel}</span>
          </button>
        ))}
        <span style={{marginLeft:"auto",fontSize:11,color:"#334155"}}>{teams.length} teams</span>
      </div>
      <div style={{maxWidth:1280,margin:"0 auto 18px",display:"flex",alignItems:"center",gap:14,
        padding:"12px 14px",borderRadius:16,background:`linear-gradient(135deg, ${normalizedLeagueColor}26 0%, rgba(255,255,255,0.03) 100%)`,
        border:`1px solid ${normalizedLeagueColor}66`}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          {!ds.isWC && <LeagueLogo dataset={ds} size={40}/>}
          {ds.isWC && (
            <img
              src="FIFA26.png"
              alt="FIFA World Cup Trophy"
              style={{width:28,height:40,objectFit:"contain",display:"block"}}
            />
          )}
        </div>
        <div style={{minWidth:0}}>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",color:"#64748b"}}>
            Active League
          </div>
          <div style={{fontSize:16,fontWeight:800,color:"#f8fafc"}}>{ds.leagueName}</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:10,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <PreviewStat label="League ID" value={ds.id}/>
          <PreviewStat label="Primary Color" value={normalizedLeagueColor}/>
        </div>
      </div>

      {/* ── Top 2-col: controls + card/split previews ── */}
      <div style={{maxWidth:1280,margin:"0 auto",display:"grid",
        gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:18,alignItems:"start"}}>

        {/* Controls */}
        <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",
          borderRadius:20,overflow:"hidden"}}>
          <div style={{padding:"13px 16px 10px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#64748b"}}>Match Controls</div>
          </div>
          <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",gap:10}}>
              <Field label="Home">
                <select style={inp} value={homeIdx} onChange={e=>{
                  const next = +e.target.value;
                  setHomeIdx(next);
                  if(next===awayIdx) setAwayIdx(ensureDifferentIndex(next, awayIdx, teams.length));
                }}>
                  {teams.map((t,i)=><option key={i} value={i}>{t.abbr} — {t.name}</option>)}
                </select>
              </Field>
              <Field label="Away">
                <select style={inp} value={awayIdx} onChange={e=>{
                  const next = +e.target.value;
                  setAwayIdx(next);
                  if(next===homeIdx) setHomeIdx(ensureDifferentIndex(next, homeIdx, teams.length));
                }}>
                  {teams.map((t,i)=><option key={i} value={i}>{t.abbr} — {t.name}</option>)}
                </select>
              </Field>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"end"}}>
              <Field label="Home Score">
                <input style={{...inp,opacity:realtimeEnabled?0.68:1,cursor:realtimeEnabled?"not-allowed":"text"}}
                  type="number" min={0} max={20} value={safeHomeScore}
                  disabled={realtimeEnabled}
                  onChange={e=>setHomeScore(clampScore(+e.target.value))}/>
              </Field>
              <button onClick={swapTeams} style={{background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,color:"#94a3b8",
                cursor:"pointer",padding:"9px 8px",fontSize:14,lineHeight:1,fontFamily:"inherit"}}>⇄</button>
              <Field label="Away Score">
                <input style={{...inp,opacity:realtimeEnabled?0.68:1,cursor:realtimeEnabled?"not-allowed":"text"}}
                  type="number" min={0} max={20} value={safeAwayScore}
                  disabled={realtimeEnabled}
                  onChange={e=>setAwayScore(clampScore(+e.target.value))}/>
              </Field>
            </div>
            <div style={{display:"flex",gap:10}}>
              <Field label="State">
                <select style={{...inp,opacity:realtimeEnabled?0.68:1,cursor:realtimeEnabled?"not-allowed":"pointer"}}
                  value={matchState} onChange={e=>setMatchState(e.target.value)} disabled={realtimeEnabled}>
                  {STATES.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </Field>
              <Field label="Clock">
                <input style={{...inp,opacity:(clockLocked||realtimeEnabled)?0.68:1,cursor:(clockLocked||realtimeEnabled)?"not-allowed":"text"}}
                  value={normalizedClock} onChange={e=>setClock(e.target.value)} placeholder="74'"
                  disabled={clockLocked||realtimeEnabled}/>
              </Field>
            </div>
            <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:11,display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <Label>Realtime Scores Feed</Label>
                <label style={{display:"inline-flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                  <input type="checkbox" checked={realtimeEnabled} onChange={e=>setRealtimeEnabled(e.target.checked)}/>
                  <span style={{fontSize:12,fontWeight:700,color:"#cbd5e1"}}>Use live endpoint</span>
                </label>
              </div>
              <Field label="Scores Endpoint URL">
                <input style={inp} value={realtimeUrl} onChange={e=>setRealtimeUrl(e.target.value)}
                  placeholder="https://sports-cache-dev.streaming.siriusxm.com/.../scores"/>
              </Field>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"end"}}>
                <Field label="Poll Interval (ms)">
                  <input style={inp} type="number" min={3000} step={1000} value={pollMs}
                    onChange={e=>setPollMs(Math.max(3000, +e.target.value || 3000))}/>
                </Field>
                <button onClick={fetchRealtimeScores} style={{background:"rgba(37,99,235,0.18)",
                  border:"1px solid rgba(96,165,250,0.28)",borderRadius:10,color:"#bfdbfe",
                  cursor:"pointer",padding:"10px 14px",fontSize:12,fontWeight:700,fontFamily:"inherit",height:40}}>
                  {isRealtimeLoading ? "Refreshing..." : "Refresh now"}
                </button>
              </div>
              <label style={{display:"inline-flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                <input type="checkbox" checked={scoreSoundEnabled} onChange={e=>setScoreSoundEnabled(e.target.checked)}/>
                <span style={{fontSize:12,fontWeight:700,color:"#cbd5e1"}}>Play crowd cheer on score changes</span>
              </label>
              <div style={{borderRadius:12,background:"rgba(255,255,255,0.035)",border:"1px solid rgba(255,255,255,0.06)",padding:"10px 12px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:10}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>Event Replay</div>
                    <div style={{fontSize:10,color:"#64748b",marginTop:3}}>Replay the score timeline in 1 to 5 minute buckets.</div>
                  </div>
                  <label style={{display:"inline-flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                    <input type="checkbox" checked={replayMode} onChange={e=>{
                      const enabled = e.target.checked;
                      setReplayMode(enabled);
                      if(!enabled) setIsReplayPlaying(false);
                    }} disabled={!replayFrames.length}/>
                    <span style={{fontSize:12,fontWeight:700,color:replayFrames.length?"#cbd5e1":"#64748b"}}>Use replay</span>
                  </label>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:8,alignItems:"end"}}>
                  <Field label="Increment">
                    <select style={inp} value={replayIncrementMinutes} onChange={e=>{
                      setReplayIncrementMinutes(+e.target.value);
                      setReplayFrameIndex(0);
                      setIsReplayPlaying(false);
                    }}>
                      {[1,2,3,4,5].map(min=>(
                        <option key={min} value={min}>{min} min</option>
                      ))}
                    </select>
                  </Field>
                  <button onClick={startReplay} disabled={!replayFrames.length} style={{background:"rgba(37,99,235,0.18)",
                    border:"1px solid rgba(96,165,250,0.28)",borderRadius:10,color:replayFrames.length?"#bfdbfe":"#64748b",
                    cursor:replayFrames.length?"pointer":"not-allowed",padding:"10px 12px",fontSize:12,fontWeight:700,fontFamily:"inherit",height:40}}>
                    Start
                  </button>
                  <button onClick={toggleReplayPlayback} disabled={!replayFrames.length} style={{background:"rgba(255,255,255,0.06)",
                    border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:replayFrames.length?"#e2e8f0":"#64748b",
                    cursor:replayFrames.length?"pointer":"not-allowed",padding:"10px 12px",fontSize:12,fontWeight:700,fontFamily:"inherit",height:40}}>
                    {isReplayPlaying ? "Pause" : replayFrameIndex >= Math.max(0, replayFrames.length - 1) ? "Restart" : "Play"}
                  </button>
                  <button onClick={stopReplay} disabled={!replayMode} style={{background:"rgba(255,255,255,0.04)",
                    border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,color:replayMode?"#cbd5e1":"#64748b",
                    cursor:replayMode?"pointer":"not-allowed",padding:"10px 12px",fontSize:12,fontWeight:700,fontFamily:"inherit",height:40}}>
                    Live
                  </button>
                </div>
                <div style={{marginTop:10}}>
                  <input type="range" min={0} max={Math.max(0, replayFrames.length - 1)} step={1}
                    value={Math.min(replayFrameIndex, Math.max(0, replayFrames.length - 1))}
                    onChange={e=>{
                      setReplayMode(true);
                      setIsReplayPlaying(false);
                      setReplayFrameIndex(+e.target.value);
                    }}
                    disabled={!replayFrames.length}
                    style={{width:"100%"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",gap:12,marginTop:8,fontSize:10,color:"#93c5fd"}}>
                  <span>{replayFrames.length ? `${replayFrames.length} replay frame${replayFrames.length===1?"":"s"}` : "Replay unavailable until timeline loads"}</span>
                  <span>{replayFrame ? `${replayFrame.label} · ${replayFrame.period} · ${replayFrame.homeScore}-${replayFrame.awayScore}` : "No replay frame selected"}</span>
                </div>
                {replayFrame && (
                  <div style={{fontSize:10,color:"#64748b",marginTop:6}}>
                    Replay timestamp: {formatFeedTimestamp(replayFrame.timestamp)}
                  </div>
                )}
              </div>
              <div style={{borderRadius:12,background:"rgba(255,255,255,0.035)",border:"1px solid rgba(255,255,255,0.06)",padding:"10px 12px"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>{realtimeStatus}</div>
                <div style={{fontSize:11,color:realtimeError?"#fca5a5":"#64748b",marginTop:4,lineHeight:1.4}}>
                  {realtimeError || `Latest update: ${formatFeedTimestamp(realtimeData?.timestamp)}`}
                </div>
                <div style={{fontSize:10,color:"#93c5fd",marginTop:6}}>
                  Sound status: {scoreSoundEnabled ? (audioReady ? "armed after interaction" : "tap or click once to arm audio") : "muted"}
                </div>
                {realtimeData && (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginTop:10}}>
                    {realtimeData.timeline.slice(0,4).map(item=>(
                      <div key={item.id} style={{borderRadius:10,background:"rgba(15,23,42,0.65)",padding:"8px 9px"}}>
                        <div style={{fontSize:9,fontWeight:800,letterSpacing:"0.08em",textTransform:"uppercase",color:"#93c5fd"}}>{item.period}</div>
                        <div style={{fontSize:13,fontWeight:800,color:"#f8fafc",marginTop:3}}>{item.homeScore} - {item.awayScore}</div>
                        <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{formatFeedTimestamp(item.timestamp)}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <Field label="League Label">
              <input style={inp} value={league} onChange={e=>setLeague(e.target.value)}/>
            </Field>
            <Field label="League Background">
              <input style={inp} value={leagueBackgroundColor} onChange={e=>setLeagueBackgroundColor(e.target.value)}
                placeholder="3d195b or #3D195B"/>
            </Field>
            <div style={{display:"flex",gap:10}}>
              <Field label="Date / Time">
                <input style={inp} value={dateLabel} onChange={e=>setDateLabel(e.target.value)}/>
              </Field>
              <Field label="Venue">
                <input style={inp} value={venue} onChange={e=>setVenue(e.target.value)}/>
              </Field>
            </div>
            <Field label="Coverage">
              <input style={inp} value={coverageLabel} onChange={e=>setCoverageLabel(e.target.value)}/>
            </Field>
            <Field label="League Abbreviation">
              <input style={inp} value={leagueAbbreviation} onChange={e=>setLeagueAbbreviation(e.target.value)}
                placeholder="EPL"/>
            </Field>
            <Field label="Stage Background">
              <select style={inp} value={bgMode} onChange={e=>setBgMode(e.target.value)}>
                <option value="blend">Blend both colors</option>
                <option value="home">Home team color</option>
                <option value="away">Away team color</option>
                <option value="custom">Custom color</option>
              </select>
            </Field>
            {bgMode==="custom"&&(
              <Field label="Custom Color">
                <input type="color" value={customBg} onChange={e=>setCustomBg(e.target.value)}
                  style={{...inp,padding:"4px 6px",height:40,cursor:"pointer"}}/>
              </Field>
            )}
            <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:11}}>
              <Label>Quick Presets</Label>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginTop:2}}>
                {PRESETS.map(p=>(
                  <button key={p.label} className="preset-btn" onClick={()=>{
                    setHomeIdx(p.hi);setAwayIdx(p.ai);
                    setHomeScore(p.hs);setAwayScore(p.as_);
                    setMatchState(p.s);setClock(p.c);
                  }} style={{background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.22)",
                    borderRadius:9,color:"#a5b4fc",cursor:"pointer",padding:"8px 11px",
                    fontSize:12,fontWeight:700,fontFamily:"inherit",textAlign:"left"}}>
                    {p.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Right col: score card + color split */}
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",
            borderRadius:20,padding:22}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",
              color:"#64748b",marginBottom:14}}>Score Card</div>
            <div style={{borderRadius:20,padding:"36px 28px",background:stageBg,
              display:"flex",justifyContent:"center",alignItems:"center",minHeight:240,
              position:"relative",overflow:"hidden",transition:"background 0.4s"}}>
              <div style={{position:"absolute",inset:0,
                background:"radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.4) 100%)",
                pointerEvents:"none"}}/>
              <ScoreCard home={displayMatchup.home} away={displayMatchup.away} homeScore={displayMatchup.homeScore} awayScore={displayMatchup.awayScore}
                state={activeScores.matchState} clock={activeScores.clock} league={league} isWC={isWC} leagueColor={normalizedLeagueColor}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginTop:14}}>
              <PreviewStat label="Date / Time" value={dateLabel}/>
              <PreviewStat label="Venue" value={venue}/>
              <PreviewStat label="Coverage" value={coverageLabel}/>
            </div>
          </div>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",
            borderRadius:20,padding:22}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",
              color:"#64748b",marginBottom:14}}>Color Split — 35°</div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <div style={{flex:1}}><Label>Team A</Label>
                <select style={inp} value={splitA} onChange={e=>setSplitA(+e.target.value)}>
                  {teams.map((t,i)=><option key={i} value={i}>{t.abbr} — {t.name}</option>)}
                </select>
              </div>
              <div style={{flex:1}}><Label>Team B</Label>
                <select style={inp} value={splitB} onChange={e=>setSplitB(+e.target.value)}>
                  {teams.map((t,i)=><option key={i} value={i}>{t.abbr} — {t.name}</option>)}
                </select>
              </div>
            </div>
            <ColorSplitPreview teamA={teamA_split} teamB={teamB_split} isWC={isWC}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
              {[teamA_split,teamB_split].map((t,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:18,height:18,borderRadius:5,background:t.color,
                    border:"1px solid rgba(255,255,255,0.15)",flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>{t.abbr}</div>
                    <div style={{fontSize:10,color:"#475569",fontFamily:"monospace"}}>{t.color}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ══ Mobile mockups row ══ */}
      <div style={{maxWidth:1280,margin:"24px auto 0"}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",
          color:"#64748b",marginBottom:20}}>Mobile Previews — driven by match controls above</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2, minmax(390px, 1fr))",gap:"24px 18px",justifyItems:"center"}}>
          <PhoneFrame label="Discover View — Home">
            <MobileDiscoverView
              home={displayMatchup.home} away={displayMatchup.away} homeScore={displayMatchup.homeScore} awayScore={displayMatchup.awayScore}
              matchState={activeScores.matchState} league={league} isWC={isWC} coverageLabel={coverageLabel} leagueColor={normalizedLeagueColor}/>
          </PhoneFrame>
          <PhoneFrame label="Sports Home Nav">
            <MobileHomeNavView
              home={displayMatchup.home} away={displayMatchup.away} league={league} isWC={isWC}
              coverageLabel={coverageLabel} venue={venue} dateLabel={dateLabel}
              leagueImage={ds.leagueImage} leagueAbbr={leagueAbbreviation} leagueColor={normalizedLeagueColor}/>
          </PhoneFrame>
          <PhoneFrame label="Now Playing — Channel">
            <MobileNowPlayingView
              home={displayMatchup.home} away={displayMatchup.away} homeScore={displayMatchup.homeScore} awayScore={displayMatchup.awayScore}
              matchState={activeScores.matchState} clock={activeScores.clock} league={league} isWC={isWC}
              coverageLabel={coverageLabel} dateLabel={dateLabel} leagueColor={normalizedLeagueColor}/>
          </PhoneFrame>
          <PhoneFrame label="List View — Today's Games">
            <MobileListView
              teams={teams} homeIdx={displaySelection.homeIdx} awayIdx={displaySelection.awayIdx}
              homeScore={displayMatchup.homeScore} awayScore={displayMatchup.awayScore}
              matchState={activeScores.matchState} clock={activeScores.clock} league={league} isWC={isWC} dateLabel={dateLabel} leagueColor={normalizedLeagueColor}/>
          </PhoneFrame>
          <PhoneFrame label="Detail View — Single Game">
            <MobileDetailView
              home={displayMatchup.home} away={displayMatchup.away} homeScore={displayMatchup.homeScore} awayScore={displayMatchup.awayScore}
              matchState={activeScores.matchState} clock={activeScores.clock} league={league} isWC={isWC}
              dateLabel={dateLabel} venue={venue} coverageLabel={coverageLabel} leagueColor={normalizedLeagueColor}/>
          </PhoneFrame>
        </div>
      </div>

      {/* Gallery */}
      <div style={{maxWidth:1280,margin:"24px auto 0",
        background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",
        borderRadius:20,padding:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",color:"#64748b"}}>
              Team Palette — {filtered.length} of {teams.length}
            </div>
            <div style={{fontSize:11,color:"#334155",marginTop:2}}>
              Left-click → Home · Right-click → Away
            </div>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder={`Search ${teams.length} teams…`}
            style={{...inp,width:"auto",minWidth:220}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(88px,1fr))",gap:9}}>
          {filtered.map(t=>{
            const ri=teams.indexOf(t);
            return (
              <div key={t.abbr} className="chip">
                <TeamChip team={t} isWC={isWC} isHome={ri===homeIdx} isAway={ri===awayIdx}
                  onClick={()=>{
                    if(ri!==homeIdx&&ri!==awayIdx) setHomeIdx(ri);
                    else if(ri===homeIdx){setHomeIdx(awayIdx);setAwayIdx(ri);}
                  }}
                  onRightClick={()=>{
                    setAwayIdx(ri);
                    if(ri===homeIdx) setHomeIdx(ensureDifferentIndex(ri, homeIdx, teams.length));
                  }}/>
              </div>
            );
          })}
          {filtered.length===0&&(
            <div style={{gridColumn:"1/-1",textAlign:"center",padding:"32px 0",
              color:"#334155",fontSize:13}}>No teams match "{search}"</div>
          )}
        </div>
      </div>
    </div>
  );
}

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
